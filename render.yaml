services:
  - type: web_service
    name: intern-backend
    env: node
    branch: main
    root: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: CLIENT_URL
        value: "https://<your-netlify-site>.netlify.app"
      - key: JWT_SECRET
        value: "<your-jwt-secret>"
      - key: MONGO_URI
        value: "<your-mongodb-uri>"
